<form hx-post="/dashboard/patient/{{ patient_id }}/notes" hx-target="#notes-list" hx-swap="afterbegin" hx-on::after-request="this.remove()" class="bg-blue-50 p-4 rounded-xl border border-blue-200 mb-4 shadow-inner">
    <div class="flex justify-between items-center mb-3">
        <label class="block text-[10px] font-black text-blue-800 uppercase tracking-widest">New Clinical Note</label>
        <div class="flex items-center space-x-2">
            <span class="text-[9px] text-blue-600 font-bold uppercase">Template:</span>
            <select id="template-selector" class="text-[10px] border rounded bg-white p-1 font-bold" onchange="applyTemplate(this.value)">
                <option value="free">Free Text</option>
                <option value="soap">SOAP Note</option>
                <option value="followup">Follow-up Call</option>
            </select>
        </div>
    </div>
    
    <textarea id="note-content" name="content" class="w-full p-3 border rounded-lg mb-3 font-mono text-xs bg-white focus:ring-2 focus:ring-blue-500 outline-none" rows="8" placeholder="Enter clinical observations..." required></textarea>
    
    <div class="flex justify-between items-center">
        <span class="text-[9px] text-blue-400 font-bold uppercase tracking-tight">Author: {{ current_user.email }}</span>
        <div class="flex space-x-2">
            <button type="button" onclick="this.closest('form').remove()" class="text-stone-400 px-3 py-1 text-[10px] font-bold uppercase">Cancel</button>
            <button type="submit" class="bg-blue-600 text-white px-5 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-blue-700 shadow-md">Save Note</button>
        </div>
    </div>

    <script>
        function applyTemplate(val) {
            const textarea = document.getElementById('note-content');
            const templates = {
                'soap': "SUBJECTIVE:\n\nOBJECTIVE:\n\nASSESSMENT:\n\nPLAN:",
                'followup': "REASON FOR CALL:\n\nPATIENT REPORT:\n\nVITALS REVIEW:\n\nINTERVENTION/EDUCATION:",
                'free': ""
            };
            textarea.value = templates[val];
            textarea.focus();
        }
    </script>
</form>
