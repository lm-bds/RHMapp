<div id="patient-modal" class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" onclick="this.parentElement.parentElement.remove()"></div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

        <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-4xl sm:w-full">
            <div class="bg-gray-50 px-6 py-4 border-b flex justify-between items-center">
                <h3 class="text-xl font-black text-gray-900">Add New Australian Patient File</h3>
                <button onclick="document.getElementById('patient-modal').remove()" class="text-gray-400 hover:text-gray-500">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>

            <form hx-post="/api/v1/patients" hx-target="body" hx-push-url="true" class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    
                    <!-- Module 1: Core Demographics -->
                    <div class="space-y-4">
                        <h4 class="text-sm font-black text-blue-600 uppercase tracking-widest border-b pb-1">1. Core Demographics</h4>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">First Name</label>
                                <input type="text" name="first_name" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">Last Name</label>
                                <input type="text" name="last_name" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">Date of Birth</label>
                                <input type="date" name="date_of_birth" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">Sex</label>
                                <select name="sex" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Intersex">Intersex</option>
                                    <option value="Not Stated">Not Stated</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Indigenous Status</label>
                            <select name="indigenous_status" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                                <option value="4">Neither Aboriginal nor Torres Strait Islander</option>
                                <option value="1">Aboriginal but not Torres Strait Islander</option>
                                <option value="2">Torres Strait Islander but not Aboriginal</option>
                                <option value="3">Both Aboriginal and Torres Strait Islander</option>
                                <option value="9">Not Stated</option>
                            </select>
                        </div>
                    </div>

                    <!-- Module 2: Health Identifiers -->
                    <div class="space-y-4">
                        <h4 class="text-sm font-black text-blue-600 uppercase tracking-widest border-b pb-1">2. Health Identifiers</h4>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="col-span-2">
                                <label class="block text-xs font-bold text-gray-500 uppercase">Medicare Number</label>
                                <input type="text" name="medicare_number" pattern="\d{10}" placeholder="1234567890" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">IRN</label>
                                <input type="number" name="medicare_irn" min="1" max="9" placeholder="1" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">DVA File Number</label>
                            <input type="text" name="dva_file_number" placeholder="NX12345" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">IHI Number (16 digits)</label>
                            <input type="text" name="ihi_number" pattern="\d{16}" placeholder="800360XXXXXXXXXX" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                        </div>
                    </div>

                    <!-- Module 3: Contact & Emergency -->
                    <div class="space-y-4">
                        <h4 class="text-sm font-black text-blue-600 uppercase tracking-widest border-b pb-1">3. Contact & Emergency (NOK)</h4>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Patient Phone</label>
                            <input type="tel" name="phone" required placeholder="0400 000 000" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Patient Address</label>
                            <textarea name="address" required rows="2" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">NOK Name</label>
                                <input type="text" name="nok_name" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">NOK Phone</label>
                                <input type="tel" name="nok_phone" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">NOK Relationship</label>
                            <select name="nok_relationship" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                                <option value="Spouse">Spouse</option>
                                <option value="Child">Child</option>
                                <option value="Carer">Carer</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <!-- Module 4: Clinical Baselines -->
                    <div class="space-y-4">
                        <h4 class="text-sm font-black text-blue-600 uppercase tracking-widest border-b pb-1">4. Heart Failure Baselines</h4>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Primary Diagnosis</label>
                            <input type="text" name="primary_diagnosis" required placeholder="e.g. HFpEF" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">NYHA Class</label>
                                <select name="nyha_class" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                                    <option value="I">I (No limitation)</option>
                                    <option value="II">II (Mild limitation)</option>
                                    <option value="III">III (Marked limitation)</option>
                                    <option value="IV">IV (Severe; at rest)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">Dry Weight (kg)</label>
                                <input type="number" step="0.1" name="baseline_weight" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">Target Systolic</label>
                                <input type="number" name="target_systolic" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase">Target Diastolic</label>
                                <input type="number" name="target_diastolic" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Primary GP / Clinic</label>
                            <input type="text" name="primary_gp" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                        </div>
                    </div>

                </div>

                <div class="mt-8 pt-6 border-t flex justify-end space-x-3">
                    <button type="button" onclick="document.getElementById('patient-modal').remove()" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-bold text-gray-700 hover:bg-gray-50">Cancel</button>
                    <button type="submit" class="inline-flex justify-center py-2 px-6 border border-transparent shadow-sm text-sm font-bold rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        Create Patient File
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
